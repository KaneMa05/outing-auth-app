<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>론박스터디 외출 인증</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">R</div>
          <div>
            <strong>론박스터디</strong>
            <span>외출 인증</span>
          </div>
        </div>
        <nav class="nav-list" aria-label="주요 메뉴">
          <p class="nav-section">학생용</p>
          <button data-route="student">외출 체크리스트</button>
        </nav>
      </aside>

      <main class="main-shell">
        <header class="topbar student-topbar" hidden>
          <div>
            <p class="eyebrow">Offline Class Control</p>
            <h1 id="page-title">외출 체크리스트</h1>
          </div>
          <div class="top-actions" hidden></div>
        </header>
        <section id="app" class="content-area" aria-live="polite"></section>
      </main>
    </div>

    <div id="toast" class="toast" role="status"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
