<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>론박스터디</title>
    <meta name="description" content="론박스터디 오프라인 전용" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="론박스터디" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="론박스터디" />
    <meta property="og:title" content="론박스터디" />
    <meta property="og:description" content="론박스터디 오프라인 전용" />
    <meta property="og:image" content="https://outing-auth-app.vercel.app/app-icon.png?v=20260505-final-icon" />
    <meta property="og:url" content="https://outing-auth-app.vercel.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="론박스터디" />
    <meta name="twitter:description" content="론박스터디 오프라인 전용" />
    <meta name="twitter:image" content="https://outing-auth-app.vercel.app/app-icon.png?v=20260505-final-icon" />
    <link rel="manifest" href="./manifest.webmanifest?v=20260506-white-theme" />
    <link rel="icon" href="./app-icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">R</div>
          <div>
            <strong>론박스터디</strong>
            <span>오프라인 학생 전용</span>
          </div>
        </div>
        <nav class="nav-list" aria-label="주요 메뉴">
          <p class="nav-section">학생용</p>
          <button data-route="home">홈</button>
          <button data-route="student">외출 신청</button>
        </nav>
      </aside>

      <main class="main-shell">
        <header class="topbar student-topbar" hidden>
          <div>
            <p class="eyebrow">Offline Class Control</p>
            <h1 id="page-title">홈</h1>
          </div>
          <div class="top-actions" hidden></div>
        </header>
        <section id="app" class="content-area" aria-live="polite"></section>
      </main>
    </div>

    <footer class="student-footer-menu" aria-label="학생 메뉴">
      <button data-route="home" type="button">
        <span class="footer-icon footer-icon-home" aria-hidden="true"></span>
        <span>홈</span>
      </button>
      <button data-route="student" type="button">
        <span class="footer-icon footer-icon-outing" aria-hidden="true"></span>
        <span>외출</span>
      </button>
      <button data-unreleased="성적" type="button" aria-disabled="true">
        <span class="footer-icon footer-icon-grades" aria-hidden="true"></span>
        <span>성적</span>
      </button>
      <button data-unreleased="출석" type="button" aria-disabled="true">
        <span class="footer-icon footer-icon-attendance" aria-hidden="true"></span>
        <span>출석</span>
      </button>
      <button data-route="mypage" type="button">
        <span class="footer-icon footer-icon-mypage" aria-hidden="true"></span>
        <span>마이</span>
      </button>
    </footer>

    <div id="toast" class="toast" role="status"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./shared.js" defer></script>
    <script src="./student.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
