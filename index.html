<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>론박스터디</title>
    <meta name="description" content="론박스터디 오프라인 전용" />
    <meta name="theme-color" content="#f3f7fb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="론박스터디" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="론박스터디" />
    <meta property="og:title" content="론박스터디" />
    <meta property="og:description" content="론박스터디 오프라인 전용" />
    <meta property="og:image" content="https://outing-auth-app.vercel.app/app-icon.png?v=20260505-final-icon" />
    <meta property="og:url" content="https://outing-auth-app.vercel.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="론박스터디" />
    <meta name="twitter:description" content="론박스터디 오프라인 전용" />
    <meta name="twitter:image" content="https://outing-auth-app.vercel.app/app-icon.png?v=20260505-final-icon" />
    <link rel="manifest" href="./manifest.webmanifest?v=20260511-date-key-fix" />
    <link rel="icon" href="./app-icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css?v=20260511-date-key-fix" />
  </head>
  <body>
    <noscript>
      <div class="no-script-warning">
        이 앱은 JavaScript가 켜져 있어야 사용할 수 있습니다. iPhone 설정에서 Safari/Chrome의 JavaScript 차단 또는 콘텐츠 차단을 해제해주세요.
      </div>
    </noscript>
    <div class="app-frame">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">R</div>
          <div>
            <strong>론박스터디</strong>
            <span>오프라인 학생 전용</span>
          </div>
        </div>
        <nav class="nav-list" aria-label="주요 메뉴">
          <p class="nav-section">학생용</p>
          <button data-route="home">홈</button>
          <button data-route="student">외출 신청</button>
        </nav>
      </aside>

      <main class="main-shell">
        <header class="topbar student-topbar" hidden>
          <div>
            <p class="eyebrow">Offline Class Control</p>
            <h1 id="page-title">홈</h1>
          </div>
          <div class="top-actions" hidden></div>
        </header>
        <section id="app" class="content-area" aria-live="polite" data-loading-shell="true"></section>
      </main>
    </div>

    <footer class="student-footer-menu" aria-label="학생 메뉴">
      <a href="#home" data-route="home" onclick="window.__studentNav && window.__studentNav('home');">
        <span class="footer-icon footer-icon-home" aria-hidden="true"></span>
        <span>홈</span>
      </a>
      <a href="#attendance" data-route="attendance" onclick="window.__studentNav && window.__studentNav('attendance');">
        <span class="footer-icon footer-icon-attendance" aria-hidden="true"></span>
        <span>출석</span>
      </a>
      <a href="#student" data-route="student" onclick="window.__studentNav && window.__studentNav('student');">
        <span class="footer-icon footer-icon-outing" aria-hidden="true"></span>
        <span>외출</span>
      </a>
      <a href="#mypage" data-route="mypage" onclick="window.__studentNav && window.__studentNav('mypage');">
        <span class="footer-icon footer-icon-mypage" aria-hidden="true"></span>
        <span>마이</span>
      </a>
    </footer>

    <div id="toast" class="toast" role="status"></div>
    <script>
      (function () {
        var routeTitles = {
          home: "홈",
          student: "외출 신청",
          attendance: "출석 체크",
          mypage: "마이페이지",
          notices: "중요 공지"
        };
        function qs(selector) {
          return document.querySelector(selector);
        }
        function qsa(selector) {
          return Array.prototype.slice.call(document.querySelectorAll(selector));
        }
        function setActive(route) {
          qsa("[data-route]").forEach(function (button) {
            if (button.getAttribute("data-route") === route) button.classList.add("active");
            else button.classList.remove("active");
          });
        }
        function showToast(message) {
          var toast = qs("#toast");
          if (!toast) return;
          toast.textContent = message;
          toast.classList.add("show");
          window.setTimeout(function () {
            toast.classList.remove("show");
          }, 2200);
        }
        var fallbackMode = false;
        function fallbackHtml(route) {
          if (route === "student") {
            return '<div class="grid student-view" data-loading-shell="true"></div>';
          }
          if (route === "attendance") {
            return '<div class="grid student-view" data-loading-shell="true"></div>';
          }
          if (route === "mypage") {
            return '<div class="grid student-view" data-loading-shell="true"></div>';
          }
          return '<div class="grid student-view" data-loading-shell="true"></div>';
        }
        function renderFallback(route) {
          var app = qs("#app");
          var title = qs("#page-title");
          if (!app) return;
          fallbackMode = true;
          app.innerHTML = fallbackHtml(route);
          if (title) title.textContent = routeTitles[route] || "홈";
          setActive(route);
        }
        function currentRoute() {
          var route = String(location.hash || "").replace("#", "");
          if (route === "student" || route === "attendance" || route === "mypage" || route === "notices" || route.indexOf("notice-") === 0) return route;
          return "home";
        }
        function shouldUseFallback() {
          var app = qs("#app");
          if (!app) return false;
          return fallbackMode || !window.render || app.hasAttribute("data-loading-shell") || Boolean(app.querySelector("[data-loading-shell]"));
        }
        function scrollTop() {
          window.requestAnimationFrame(function () {
            window.scrollTo(0, 0);
            document.documentElement.scrollTop = 0;
            document.body.scrollTop = 0;
          });
        }
        function navFallback(route) {
          var sameRoute = currentRoute() === route && location.hash === "#" + route;
          location.hash = route;
          if (shouldUseFallback()) renderFallback(route);
          if (sameRoute) scrollTop();
        }
        function unreleasedFallback(featureName) {
          if (typeof window.openUnreleasedModal === "function") window.openUnreleasedModal(featureName);
          else showToast("준비 중인 기능입니다.");
        }
        window.__studentFallbackRender = renderFallback;
        window.__studentNav = navFallback;
        window.__studentUnreleased = unreleasedFallback;
        window.__studentAppReady = function () {
          var app = qs("#app");
          fallbackMode = false;
          if (app) app.removeAttribute("data-loading-shell");
        };
        document.addEventListener("click", function (event) {
          var node = event.target;
          while (node && node !== document && node.nodeType !== 1) {
            node = node.parentNode;
          }
          while (node && node !== document && !node.getAttribute("data-route") && !node.getAttribute("data-unreleased") && !node.getAttribute("data-fallback-route")) {
            node = node.parentNode;
          }
          if (!node || node === document) return;
          var unreleased = node.getAttribute("data-unreleased");
          if (unreleased) {
            event.preventDefault();
            unreleasedFallback(unreleased);
            return;
          }
          var route = node.getAttribute("data-route") || node.getAttribute("data-fallback-route");
          if (!route) return;
          if (route === "home" || route === "student" || route === "attendance" || route === "mypage" || route === "notices" || route.indexOf("notice-") === 0) {
            if (shouldUseFallback()) {
              event.preventDefault();
              navFallback(route);
            }
          }
        }, true);
        window.addEventListener("hashchange", function () {
          if (shouldUseFallback()) renderFallback(currentRoute());
          scrollTop();
        });
        window.setTimeout(function () {
          if (shouldUseFallback()) renderFallback(currentRoute());
        }, 900);
      })();
    </script>
    <script src="./config.js?v=20260511-date-key-fix"></script>
    <script src="./supabase.js?v=20260511-date-key-fix" defer></script>
    <script src="./shared.js?v=20260511-date-key-fix" defer></script>
    <script src="./student.js?v=20260511-date-key-fix" defer></script>
    <script src="./app.js?v=20260511-date-key-fix" defer></script>
  </body>
</html>
