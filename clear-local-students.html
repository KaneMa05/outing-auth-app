<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학생 데이터 삭제</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7f6;
        color: #16231f;
      }
      main {
        width: min(420px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid #dce5e1;
        border-radius: 8px;
        background: #fff;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #5f6f68;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>학생 데이터 삭제 완료</h1>
      <p id="result">처리 중입니다.</p>
    </main>
    <script>
      const storageKey = "ronpark_outing_auth_v2";
      const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
      saved.students = [];
      localStorage.setItem(storageKey, JSON.stringify(saved));
      document.querySelector("#result").textContent = "이 브라우저에 저장된 학생 등록 목록을 비웠습니다.";
    </script>
  </body>
</html>
